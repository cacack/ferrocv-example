name: build

# GitHub Pages visibility warning:
# On Free plans, Pages cannot publish from a private repo at all.
# On Pro/Team plans, Pages from a private repo publishes a PUBLIC site
# (reachable at https://<user>.github.io/<repo>). Private-access Pages
# requires GitHub Enterprise Cloud. The Pages deploy below is therefore
# opt-in via the `publish_pages` workflow_dispatch input.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      publish_pages:
        description: "Also deploy to GitHub Pages (PUBLIC site on Pro/Team — see warning in workflow file)"
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  FERROCV_VERSION: v0.4.0

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: check spelling
        uses: crate-ci/typos@master

      - name: install ferrocv
        run: |
          set -euo pipefail
          target=x86_64-unknown-linux-gnu
          url="https://github.com/cacack/ferrocv/releases/download/${FERROCV_VERSION}/ferrocv-${target}.tar.gz"
          curl --proto '=https' --tlsv1.2 -fsSL "$url" | tar -xz -C /usr/local/bin ferrocv
          ferrocv --version

      - name: validate resume.json
        run: ferrocv validate resume.json

      - name: check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --verbose resume.json
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  render:
    name: render
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install ferrocv
        run: |
          set -euo pipefail
          target=x86_64-unknown-linux-gnu
          url="https://github.com/cacack/ferrocv/releases/download/${FERROCV_VERSION}/ferrocv-${target}.tar.gz"
          curl --proto '=https' --tlsv1.2 -fsSL "$url" | tar -xz -C /usr/local/bin ferrocv
          ferrocv --version

      - name: render PDF
        run: ferrocv render resume.json --theme typst-jsonresume-cv --output dist/resume.pdf

      - name: render HTML
        run: ferrocv render resume.json --format html --output dist/resume.html

      - name: render plain text
        run: ferrocv render resume.json --format text --output dist/resume.txt

      - name: upload rendered preview
        uses: actions/upload-artifact@v4
        with:
          name: resume-${{ github.sha }}
          path: dist/resume.*
          retention-days: 14

      - name: publish latest release
        if: ${{ github.event_name != 'pull_request' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release delete latest --yes --cleanup-tag --repo "$GITHUB_REPOSITORY" || true
          gh release create latest dist/resume.* \
            --repo "$GITHUB_REPOSITORY" \
            --title "latest" \
            --notes "Rendered from ${GITHUB_SHA}" \
            --latest

      - name: stage pages content
        if: ${{ inputs.publish_pages == true }}
        run: cp .github/pages/index.html dist/index.html

      - name: upload pages artifact
        if: ${{ inputs.publish_pages == true }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: deploy to pages
    if: ${{ inputs.publish_pages == true }}
    needs: render
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
