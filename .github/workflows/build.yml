name: build

# GitHub Pages visibility warning:
# On Free plans, Pages cannot publish from a private repo at all.
# On Pro/Team plans, Pages from a private repo publishes a PUBLIC site
# (reachable at https://<user>.github.io/<repo>). Private-access Pages
# requires GitHub Enterprise Cloud. The Pages deploy below is therefore
# opt-in via the `publish_pages` workflow_dispatch input.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      publish_pages:
        description: "Also deploy to GitHub Pages (PUBLIC site on Pro/Team — see warning in workflow file)"
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: check spelling
        uses: crate-ci/typos@bbaefadf97b0ec5fdc942684b647f1a6ab250274 # v1.46.0

      - uses: cacack/ferrocv/.github/actions/setup-ferrocv@5adbb38da14492e5e96ad1610d53bf1600fe8d51 # v0.5.0
        with:
          version: v0.5.0

      - name: validate resume.json
        run: ferrocv validate resume.json

      - name: check links
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: --no-progress --verbose resume.json
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  render:
    name: render
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: cacack/ferrocv/.github/actions/setup-ferrocv@5adbb38da14492e5e96ad1610d53bf1600fe8d51 # v0.5.0
        with:
          version: v0.5.0

      - name: render PDF
        run: ferrocv render resume.json --theme typst-jsonresume-cv --output dist/resume.pdf

      - name: render HTML
        run: ferrocv render resume.json --format html --output dist/resume.html

      - name: render plain text
        run: ferrocv render resume.json --format text --output dist/resume.txt

      - name: upload rendered preview
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: resume-${{ github.sha }}
          path: dist/resume.*
          retention-days: 14

      - name: publish latest release
        if: ${{ github.event_name != 'pull_request' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release delete latest --yes --cleanup-tag --repo "$GITHUB_REPOSITORY" || true
          gh release create latest dist/resume.* \
            --repo "$GITHUB_REPOSITORY" \
            --title "latest" \
            --notes "Rendered from ${GITHUB_SHA}" \
            --latest

      - name: stage pages content
        if: ${{ inputs.publish_pages == true }}
        run: cp .github/pages/index.html dist/index.html

      - name: upload pages artifact
        if: ${{ inputs.publish_pages == true }}
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: dist

  deploy:
    name: deploy to pages
    if: ${{ inputs.publish_pages == true }}
    needs: render
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
